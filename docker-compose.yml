version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YourStrong!Passw0rd", "-C", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mssql-data:/var/opt/mssql

  db-init:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      db:
        condition: service_healthy
    command: /bin/bash -c "/opt/mssql-tools/bin/sqlcmd -S db -U sa -P 'YourStrong!Passw0rd' -Q \"IF DB_ID('reserva_canchas') IS NULL CREATE DATABASE reserva_canchas;\""

  backend:
    build:
      context: ./Sistema_Cancha/Sistema_Cancha
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlserver://db:1433;databaseName=reserva_canchas;encrypt=true;trustServerCertificate=true;
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=YourStrong!Passw0rd
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend-canchas
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mssql-data:
